name: Deploy MkDocs
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # Sposta i file .md e anche la cartella delle immagini dentro docs prima del build
      - run: |
          mkdir -p docs
          find . -maxdepth 1 -name "*.md" -exec mv {} docs/ \;
          if [ -d "immagini" ]; then mv immagini docs/; fi
      
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
      - run: pip install mkdocs-material
      - run: mkdocs gh-deploy --force
