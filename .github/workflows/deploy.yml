name: Deploy MkDocs
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - run: |
          find . -maxdepth 1 -name "*.md" -exec sed -i 's/\xc2\xa0/ /g' {} \;
          find . -maxdepth 1 -name "*.md" -exec sed -i -E 's/^!!! info[[:space:]]+/!!! info /g' {} \;
          find . -maxdepth 1 -name "*.md" -exec sed -i -E 's/^[[:space:]]+\*(Specifica aggiornata il.*)\*/    *\1*/g' {} \;
          if [ -d "Immagini" ]; then mv Immagini immagini; fi
          mkdir -p docs
          find . -maxdepth 1 -name "*.md" -exec mv {} docs/ \;
          if [ -d "immagini" ]; then mv immagini docs/; fi
          
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
          
      - run: pip install mkdocs-material mkdocs-git-revision-date-localized-plugin
      
      - run: mkdocs gh-deploy --force
